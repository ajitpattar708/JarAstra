# JarAstra Configuration
osv.api.url=https://api.osv.dev/v1/query
osv.batch.api.url=https://api.osv.dev/v1/querybatch
mavencentral.api.url=https://search.maven.org/solrsearch/select
# maven.home is automatically detected but can be overridden here
# maven.home=C:/path/to/m2/repository
build.timeout.seconds=600
llm.cache.enabled=true

# LLM Configuration (Set to 'ollama' for local-first analysis)
llm.provider=ollama
llm.model=llama3
llm.temperature=0
llm.base.url=http://localhost:11434
